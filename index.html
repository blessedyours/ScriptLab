<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ScriptLab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>ScriptLab</h1>
<p class="subtitle">
Open.MP / SA:MP Command Builder v1.1
</p>

<select id="framework">
    <option value="zcmd">ZCMD</option>
    <option value="pawncmd">Pawn.CMD</option>
    <option value="plain">Vanilla Pawn</option>
</select>

<select id="commandType" onchange="updateFields()">
    <option value="giveweapon">Give Weapon</option>
    <option value="revive">Revive Player</option>
    <option value="kill">Kill Player</option>
    <option value="health">Give Health</option>
    <option value="armour">Give Armour</option>
    <option value="repair">Repair Vehicle</option>
    <option value="destroyvehicle">Destroy Vehicle</option>
    <option value="money">Give Money</option>
    <option value="setmoney">Set Money</option>
    <option value="kick">Kick</option>
    <option value="ban">Ban</option>
</select>

<div id="extraFields"></div>

<input id="cmdName" placeholder="Command Name">

<input id="adminLevel" type="number" placeholder="Admin Level" value="1">

<button onclick="generateCode()">
Generate Code
</button>

<button onclick="copyCode()">
Copy Code
</button>

<textarea id="output" readonly></textarea>

</div>

<script src="script.js"></script>

</body>
</html>
